server:
  port: 8888

spring:
  application:
    name: config-server

  profiles:
    active: native

  cloud:
    config:
      server:
        native:
          search-locations: classpath:/configs

management:
  endpoints:
    web:
      exposure:
        include: health,info,env
  endpoint:
    health:
      show-details: always

#Why native profile? Instead of pointing to a Git repo for configs, we're using local classpath files. This is perfect for local development — simpler, no extra Git repo needed.