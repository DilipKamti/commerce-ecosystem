spring:
  application:
    name: user-service
  config:
    import: "configserver:http://localhost:8888"

  cloud:
    config:
      fail-fast: true

eureka:
  instance:
    hostname: localhost
    prefer-ip-address: false
    instance-id: ${spring.application.name}:${server.port}
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/